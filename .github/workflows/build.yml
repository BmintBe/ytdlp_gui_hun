name: Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
      - name: Build Windows exe
        run: |
          pip install PyQt6 pyinstaller pillow
          python -c "
from PIL import Image
import struct, zlib

img = Image.open('icon.png').resize((256,256), Image.LANCZOS).convert('RGBA')
img.save('icon.ico', format='ICO', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])
"
          pyinstaller --onefile --windowed --icon=icon.ico --name "yt-dlp GUI" ytdlp_gui.py
      - uses: actions/upload-artifact@v4.6.2
        with:
          name: yt-dlp-GUI-Windows
          path: "dist/yt-dlp GUI.exe"

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
      - name: PNG → ICNS konvertálás
        run: |
          mkdir icon.iconset
          sips -z 16   16   icon.png --out icon.iconset/icon_16x16.png
          sips -z 32   32   icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32   32   icon.png --out icon.iconset/icon_32x32.png
          sips -z 64   64   icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128  128  icon.png --out icon.iconset/icon_128x128.png
          sips -z 256  256  icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256  256  icon.png --out icon.iconset/icon_256x256.png
          sips -z 512  512  icon.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512  512  icon.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 icon.png --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o icon.icns
      - name: Build macOS app
        run: |
          pip install PyQt6 py2app
          python setup.py py2app
          cd dist && zip -r "yt-dlp-GUI-macOS.zip" "yt-dlp GUI.app"
      - uses: actions/upload-artifact@v4.6.2
        with:
          name: yt-dlp-GUI-macOS
          path: dist/yt-dlp-GUI-macOS.zip
